<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eric · 26</title>

  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay"></div>

<div class="container">

  <div class="card">

    <span class="tag">ESTÁS INVITADO</span>

    <div class="line"></div>

    <h1 id="title">ERIC · 26</h1>

    <p class="subtitle">
      Te invito a recibir mis 26 años
    </p>

    <div class="info-box">

      <div class="info-item">
        <span>Fecha</span>
        <p id="fecha">Viernes 21 de Mayo, 2026</p>
      </div>

      <div class="info-item">
        <span>Horario</span>
        <p id="hora">21:30 hs</p>
      </div>

      <div class="info-item">
        <span>Dirección</span>

        <a
          id="maps-link"
          href="#"
          target="_blank"
        >
          Bar Bricks · Corrientes 366
        </a>
      </div>

    </div>

    <div class="countdown">

      <div>
        <strong id="dias">00</strong>
        <span>días</span>
      </div>

      <div>
        <strong id="horas">00</strong>
        <span>hs</span>
      </div>

      <div>
        <strong id="minutos">00</strong>
        <span>min</span>
      </div>

    </div>

    <p class="phrase">
      Quiero celebrar con las personas que forman parte de mi día a día.
    </p>

    <div class="guest-box">
      Invitado:
      <strong id="guest-name"></strong>
    </div>

    <h3 class="confirm-title">
      Confirmá tu asistencia
    </h3>

    <div class="buttons">

      <button
        id="btn-si"
        class="active"
      >
        ASISTIRÉ
      </button>

      <button id="btn-no">
        NO PODRÉ
      </button>

    </div>

    <textarea
      id="mensaje"
      placeholder="Mensaje opcional..."
    ></textarea>

    <button id="confirmar-btn">
      CONFIRMAR ASISTENCIA
    </button>

    <p class="thanks">
      Gracias por ser parte ✨
    </p>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
