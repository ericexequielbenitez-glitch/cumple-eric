<script>

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbz8pxaG0C_kzEVMLN60azCXl7xobPucjsTZEl2J1bVqADM2p8eKVDd9HBRwBSvmKnwfpA/exec";

const params = new URLSearchParams(window.location.search);

const invitado = params.get("nombre") || "Invitado";

let asistira = true;

const btnSi = document.getElementById("btn-si");
const btnNo = document.getElementById("btn-no");

btnSi.addEventListener("click", () => {
  asistira = true;
});

btnNo.addEventListener("click", () => {
  asistira = false;
});

document
  .getElementById("confirmar-btn")
  .addEventListener("click", async () => {

    const mensaje =
      document.getElementById("mensaje").value;

    try {

      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          nombre: invitado,
          asistencia: asistira ? "Asiste" : "No asiste",
          mensaje: mensaje
        })
      });

      const data = await response.json();

      alert("Confirmación enviada ✨");

      console.log(data);

    } catch (error) {

      console.error(error);

      alert("Error al enviar confirmación");

    }

});
</script>
