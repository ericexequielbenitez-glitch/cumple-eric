<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">

  <div class="card" style="max-width:900px;">

    <h1 style="font-size:48px;">
      PANEL ADMIN
    </h1>

    <div class="countdown" style="margin-top:30px;">

      <div>
        <strong id="total">0</strong>
        <span>Total</span>
      </div>

      <div>
        <strong id="asisten">0</strong>
        <span>Asisten</span>
      </div>

      <div>
        <strong id="no-asisten">0</strong>
        <span>No asisten</span>
      </div>

    </div>

    <div class="info-box" style="margin-top:40px;">

      <h3>
        Generar link personalizado
      </h3>

      <br>

      <input
        id="nombre-input"
        placeholder="Nombre invitado"
        style="width:100%;height:54px;border-radius:12px;padding:15px;background:#0e0e0e;color:white;border:none;"
      >

      <br><br>

      <select
        id="evento-select"
        style="width:100%;height:54px;border-radius:12px;padding:15px;background:#0e0e0e;color:white;border:none;"
      >

        <option value="principal">
          Cumple principal
        </option>

        <option value="after">
          After
        </option>

      </select>

      <br><br>

      <button id="generar-link">
        GENERAR LINK
      </button>

      <br><br>

      <textarea id="link-result"></textarea>

    </div>

    <button
      id="excel-btn"
      style="margin-top:30px;width:100%;"
    >
      EXPORTAR EXCEL
    </button>

    <div
      id="respuestas"
      style="margin-top:40px;"
    ></div>

  </div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
