<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin – Invitación Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-dark admin-layout">

  <main class="admin-wrapper">

    <!-- PANEL IZQUIERDO -->
    <section class="admin-left">

      <h1 class="admin-title">Panel de eventos</h1>
      <p class="admin-subtitle">Crear, editar y visualizar tu invitación en vivo.</p>

      <!-- FORMULARIO -->
      <div class="admin-section">
        <h2 class="section-title">Datos del evento</h2>

        <form id="event-form" class="form-grid">

          <div class="form-group">
            <label>ID / slug</label>
            <input id="event-id" type="text" placeholder="cumple-eric" required />
          </div>

          <div class="form-group">
            <label>Título</label>
            <input id="event-title-input" type="text" placeholder="Te invito a festejar mis 26" required />
          </div>

          <div class="form-group">
            <label>Frase elegante</label>
            <input id="event-phrase-input" type="text" placeholder="Una noche para celebrar juntos." required />
          </div>

          <div class="form-group">
            <label>Fecha</label>
            <input id="event-date-input" type="date" required />
          </div>

          <div class="form-group">
            <label>Horario</label>
            <input id="event-time-input" type="time" required />
          </div>

          <div class="form-group">
            <label>Dirección</label>
            <input id="event-address-input" type="text" placeholder="Bar Bricks – Corrientes 366" required />
          </div>

          <div class="form-group">
            <label>Google Maps (opcional)</label>
            <input id="event-maps-input" type="url" placeholder="https://maps.google.com/..." />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar evento</button>
            <button type="button" id="btn-new-event" class="btn btn-outline">Nuevo</button>
          </div>

        </form>
      </div>

      <!-- LINKS -->
      <div class="admin-section">
        <h2 class="section-title">Links personalizados</h2>

        <div class="form-grid">
          <div class="form-group">
            <label>Evento</label>
            <select id="link-event-select"></select>
          </div>

          <div class="form-group">
            <label>Nombre invitado</label>
            <input id="link-name-input" type="text" placeholder="Juan" />
          </div>

          <div class="form-group">
            <label>Link generado</label>
            <input id="generated-link" type="text" readonly />
          </div>

          <div class="form-actions">
            <button id="btn-generate-link" class="btn btn-primary">Generar link</button>
            <button id="btn-copy-link" class="btn btn-outline">Copiar</button>
            <span id="link-status" class="status"></span>
          </div>
        </div>
      </div>

    </section>

    <!-- PANEL DERECHO (PREVIEW) -->
    <section class="admin-right">
      <h2 class="section-title">Vista previa en vivo</h2>

      <iframe id="preview-frame" class="preview-frame" src="index.html"></iframe>

    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
